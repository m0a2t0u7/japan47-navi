<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本47ナビ</title>

<style>
:root{
--bg:#f4ede0;
--paper:#fbf6ec;
--ink:#1c1814;
--sub:#8a7d6a;
--border:#d6c9b0;
--accent:#b94e3d;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--ink);
}

header{
background:var(--paper);
padding:16px;
border-bottom:1px solid var(--border);
}

h1{
margin:0;
font-size:20px;
}

input{
width:100%;
margin-top:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
}

/* グリッド */
main{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:14px;
padding:14px;
}

/* カード */
.card{
background:var(--paper);
border:1px solid var(--border);
border-radius:14px;
padding:12px;
display:flex;
flex-direction:column;
gap:6px;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.meta{
font-size:12px;
color:var(--sub);
}

.tags span{
font-size:11px;
border:1px solid var(--border);
padding:3px 6px;
margin:2px;
border-radius:6px;
cursor:pointer;
display:inline-block;
}

.actions{
display:flex;
gap:6px;
margin-top:6px;
}

.actions button{
flex:1;
padding:6px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;
}

.favorite{
color:red;
}

/* モーダル */
#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
}

.hidden{display:none;}

.modal-box{
background:white;
padding:20px;
width:90%;
max-width:500px;
border-radius:12px;
max-height:90vh;
overflow:auto;
}
</style>

</head>
<body>

<header>
<h1>日本47都道府県ガイド</h1>
<input id="search" placeholder="検索（例：大阪・寿司・自然）">

<div style="margin-top:8px;">
<button onclick="showAll()">全体</button>
<button onclick="showFavorites()">★お気に入り</button>
<button onclick="startQuiz()">クイズ</button>
</div>
</header>

<main id="app"></main>
<div id="modal" class="hidden"></div>

<script>

/* ===== データ（あとで増やすだけでOK） ===== */
const data = [
{name:"北海道",region:"北海道",capital:"札幌市",desc:"広大な自然",food:["ジンギスカン","海鮮"],nature:["知床"],tags:["自然","観光"]},
{name:"大阪府",region:"近畿",capital:"大阪市",desc:"食い倒れ",food:["たこ焼き","お好み焼き"],nature:["大阪城"],tags:["グルメ","都市"]},
{name:"東京都",region:"関東",capital:"新宿区",desc:"日本の中心",food:["寿司","天ぷら"],nature:["浅草"],tags:["都市","観光"]}
];

/* ===== 状態 ===== */
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let compareList = [];

const app = document.getElementById("app");
const modal = document.getElementById("modal");
const search = document.getElementById("search");

/* ===== 描画 ===== */
function render(list){
app.innerHTML = list.map(p=>`
<div class="card">

<div class="card-header">
<h2>${p.name}</h2>
<span class="${favorites.includes(p.name)?"favorite":""}" onclick="toggleFav('${p.name}')">
${favorites.includes(p.name)?"★":"☆"}
</span>
</div>

<div class="meta">${p.region} / ${p.capital}</div>

<div class="tags">
${p.tags.map(t=>`<span onclick="tagSearch('${t}')">${t}</span>`).join("")}
</div>

<div class="actions">
<button onclick="openDetail('${p.name}')">詳細</button>
<button onclick="addCompare('${p.name}')">比較</button>
</div>

</div>
`).join("");
}

/* ===== 詳細 ===== */
function openDetail(name){
const p = data.find(d=>d.name===name);
modal.classList.remove("hidden");

modal.innerHTML=`
<div class="modal-box">
<button onclick="closeModal()">閉じる</button>
<h2>${p.name}</h2>
<p>${p.desc}</p>

<h3>食べ物</h3>
<ul>${p.food.map(f=>`<li>${f}</li>`).join("")}</ul>

<h3>観光</h3>
<ul>${p.nature.map(n=>`<li>${n}</li>`).join("")}</ul>
</div>
`;
}

function closeModal(){
modal.classList.add("hidden");
}

/* ===== 検索 ===== */
search.oninput=()=>{
const q=search.value;
render(data.filter(p=>JSON.stringify(p).includes(q)));
};

/* ===== タグ ===== */
function tagSearch(tag){
render(data.filter(p=>p.tags.includes(tag)));
}

/* ===== お気に入り ===== */
function toggleFav(name){
if(favorites.includes(name)){
favorites = favorites.filter(f=>f!==name);
}else{
favorites.push(name);
}
localStorage.setItem("fav",JSON.stringify(favorites));
render(data);
}

function showFavorites(){
render(data.filter(p=>favorites.includes(p.name)));
}

function showAll(){
render(data);
}

/* ===== 比較 ===== */
function addCompare(name){
if(!compareList.includes(name)) compareList.push(name);

if(compareList.length===2){
const items = data.filter(p=>compareList.includes(p.name));

modal.classList.remove("hidden");
modal.innerHTML=`
<div class="modal-box">
<h2>比較</h2>
${items.map(i=>`
<h3>${i.name}</h3>
食:${i.food.join(",")}<br>
観光:${i.nature.join(",")}
<hr>
`).join("")}
<button onclick="closeModal()">閉じる</button>
</div>
`;
compareList=[];
}
}

/* ===== クイズ ===== */
function startQuiz(){
const item = data[Math.floor(Math.random()*data.length)];
modal.classList.remove("hidden");

modal.innerHTML=`
<div class="modal-box">
<h3>この食べ物はどこ？</h3>
<p>${item.food[0]}</p>

${data.map(d=>`
<button onclick="checkAnswer('${d.name}','${item.name}')">${d.name}</button>
`).join("")}

</div>
`;
}

function checkAnswer(ans,correct){
alert(ans===correct?"正解":"違う");
closeModal();
}

render(data);

</script>

</body>
</html>
